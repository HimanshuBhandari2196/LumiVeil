<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LumiVeil</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="header">
    <span class="logo">👁 LumiVeil</span>
    <span class="tagline">Lift the veil</span>
  </div>

  <div class="input-section">
    <textarea id="userInput" placeholder="Paste a URL, image link, or type a claim to verify..."></textarea>
    <button id="analyzeBtn">Analyze</button>
  </div>

  <div class="result-section" id="resultSection">
    <p id="resultText">Results will appear here...</p>
    <button id="fullReportBtn">View Full Report →</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
